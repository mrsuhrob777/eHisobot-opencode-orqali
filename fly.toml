app = "ehisobot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "ehisobot_data"
  destination = "/app/data"

[env]
  DATABASE_URL = "file:/app/data/ehisobot.db"
  NODE_ENV = "production"
  LOG_LEVEL = "info"
